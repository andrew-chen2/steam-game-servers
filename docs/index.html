<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Steam Game Servers</title>
	<link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >
    <link
      href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <div class="container-fluid">
        <div>
            <form id="search-form">
                <label for="search-name" class="form-label">Server Name</label>
                <input type="text" name="search-name" class="form-control" placeholder="Search server name..." />
                <label for="search-map" class="form-label">Map</label>
                <input type="text" name="search-map" class="form-control" placeholder="Search map name..." />
                <label for="search-game">Game</label>
                <select id="search-game" name="search-game" class="form-select">
                    <option value="">All</option>
                </select>
                <div class="form-check">
                    <input id="search-secure" type="checkbox" name="search-secure" class="form-check-input" />
                    <label for="search-secure" class="form-check-label">Is Secure</label>
                </div>
                <div class="form-check">
                    <input id="search-not-full" type="checkbox" name="search-not-full" class="form-check-input" />
                    <label for="search-not-full" class="form-check-label">Not Full</label>
                </div>
                <div class="form-check">
                    <input id="search-has-players" type="checkbox" name="search-has-players" class="form-check-input" />
                    <label for="search-has-players" class="form-check-label">Has Players</label>
                </div>
                <button type="submit" class="btn btn-primary">Go</button>
            </form>
            <div>
                <a id="btn-connect" class="btn btn-primary disabled" href="#">Join Server</a>
                <button id="btn-copy" class="btn btn-secondary" disabled>Copy IP</button>
            </div>
        </div>
        <div id="wrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
	<script src="index.js"></script>
</body>
</html>
