<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Steam Game Servers</title>
	<link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >
    <link
      href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <div class="container-fluid">
        <div>
            <form id="search-form">
                <label for="search-name" class="form-label">Server Name</label>
                <input type="text" name="search-name" class="form-control" />
                <label for="search-map" class="form-label">Map</label>
                <input type="text" name="search-map" class="form-control" />
                <button type="submit" class="btn btn-primary">Go</button>
            </form>
            <div>
                <button id="btn-connect" class="btn btn-primary" disabled>Join Server</button>
                <button id="btn-copy" class="btn btn-secondary" disabled>Copy IP</button>
            </div>
        </div>
        <div id="wrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
	<script src="index.js"></script>
</body>
</html>
